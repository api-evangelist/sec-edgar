description: SEC EDGAR is free U.S. Government public data — there is no provider charge. FinOps focus
  is therefore on internal cost-to-serve (egress, compute to parse filings, downstream storage) rather
  than vendor spend. No FOCUS BillingCost line items exist for SEC; meters track operational consumption
  for showback inside the consuming organization.
sources:
  - https://www.sec.gov/os/accessing-edgar-data
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: U.S. Securities and Exchange Commission
serviceCategory: Open Government Data
billingModel:
  pricingCategory: Free / Public Data
  billingFrequency: N/A
  billingCurrency: USD
  chargeCategories:
    - Usage
focusColumns:
  ServiceName: SEC EDGAR
  ServiceCategory: Open Government Data
  ProviderName: U.S. Securities and Exchange Commission
  PublisherName: U.S. Securities and Exchange Commission
  InvoiceIssuerName: N/A
  BillingCurrency: USD
meters:
  - name: edgar_requests
    description: Count of HTTP requests sent to SEC EDGAR endpoints (internal observability meter; not
      billed)
    unit: request
    aggregation: sum
    dimensions:
      - endpoint
      - consumer
  - name: edgar_egress_bytes
    description: Bytes downloaded from SEC EDGAR (filings, XBRL, search results)
    unit: GB
    aggregation: sum
    dimensions:
      - endpoint
      - consumer
  - name: filings_parsed
    description: Filings or XBRL documents parsed downstream (drives compute / storage cost-to-serve)
    unit: document
    aggregation: sum
    dimensions:
      - form_type
      - consumer
principles:
  - name: Visibility
    description: SEC EDGAR has no vendor invoice. Track internal usage by capturing the User-Agent in
      logs, metering request counts and downloaded bytes per consuming team, and reporting these as showback
      indicators.
  - name: Allocation
    description: Allocate downstream storage and compute (for parsing filings, indexing XBRL) to the consuming
      team via the same User-Agent / consumer-id dimension.
  - name: Optimization
    description: Stay under the 10 req/s cap; cache filings locally, use bulk index/ZIP downloads for
      backfills instead of hitting submissions endpoints, and dedupe by accession number.
  - name: Accountability
    description: Engineering owners of the consuming application are accountable for User-Agent compliance
      and for not getting the source IP blocked by SEC; finance accountability is limited to internal
      cost-to-serve.
