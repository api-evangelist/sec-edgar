specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: SEC EDGAR
providerId: sec-edgar
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - SEC
  - Filings
  - Regulatory
  - Rate Limiting
description: SEC EDGAR enforces a fair-access policy of no more than 10 requests per second to its public
  endpoints (efts.sec.gov, data.sec.gov, www.sec.gov). All requests must include a descriptive User-Agent
  header containing a contact email. Excessive traffic results in temporary IP blocks. There is no API
  key and no per-tier differentiation.
sources:
  - https://www.sec.gov/os/accessing-edgar-data
  - https://www.sec.gov/about/webmaster-faq
responseCodes:
  throttled: 429
  blocked: 403
limits:
  - name: SEC fair-access cap
    scope: IP
    metric: requests_per_second
    limit: 10
    timeFrame: second
    notes: Applies aggregate across efts.sec.gov, data.sec.gov, and www.sec.gov. Requests above this rate
      are throttled or temporarily blocked.
policies:
  - name: User-Agent header required
    description: Requests must include a descriptive User-Agent identifying the company / individual and
      a contact email (e.g., "Sample Company Name AdminContact@example.com"). Default library User-Agents
      are commonly blocked.
  - name: Backoff
    description: On 403 or 429, back off and reduce request rate. Excessive requests can trigger an IP-level
      block; SEC will lift blocks once acceptable behavior is observed.
  - name: Bulk download alternative
    description: For large workloads, pull bulk data from EDGAR's daily/quarterly index files or the bulk
      ZIP archives instead of hammering the API endpoints.
  - name: No authentication
    description: All endpoints are anonymous. There is no API key, OAuth, or paid tier. The rate limit
      applies uniformly per source IP.
maintainers:
  - name: Kin Lane
    email: kin@apievangelist.com
