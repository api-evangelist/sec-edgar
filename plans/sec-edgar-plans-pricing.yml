specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: SEC EDGAR
providerId: sec-edgar
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - SEC
  - Filings
  - Regulatory
  - Open Data
  - Free
description: SEC EDGAR is a free, public, U.S. Government data service operated by the U.S. Securities
  and Exchange Commission. There are no paid plans, no API keys, and no commercial terms — access is governed
  by the SEC's fair-access policy. The single "plan" is open public access; consumers must include a
  descriptive User-Agent header identifying the requesting party.
sources:
  - https://www.sec.gov/os/accessing-edgar-data
  - https://www.sec.gov/about/webmaster-faq
plans:
  - id: sec-edgar-public
    name: Public Access
    type: freemium
    description: Free, anonymous public access to SEC EDGAR data. No registration; no commercial fee.
      Bound by SEC fair-access throttling and the requirement to identify the client via User-Agent.
    entries:
      - label: API Access
        name: api_access
        type: flat
        metric: requests
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '$0'
        userMultiplied: false
      - label: Fair-Access Cap
        name: fair_access_cap
        type: rate
        metric: requests_per_second
        limit: 10
        timeFrame: second
        geo: global
        unit: 1
        price: included
        userMultiplied: false
    elements:
      - name: SEC EDGAR Full-Text Search API
      - name: SEC EDGAR Submissions API
      - name: SEC EDGAR XBRL Company Facts API
      - name: SEC EDGAR Company Filings API
      - name: User-Agent header required
      - name: No authentication
maintainers:
  - name: Kin Lane
    email: kin@apievangelist.com
